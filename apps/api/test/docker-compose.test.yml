# Isolated test stack for the API e2e suite.
# Postgres+Redis on non-default ports, tmpfs storage (ephemeral, fast).
# Brings up via:  npm run test:db:up
# Brings down via: npm run test:db:down

services:
  test-postgres:
    image: postgis/postgis:16-3.4
    container_name: stomvp-test-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: stomvp_test
    ports:
      - "5435:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d stomvp_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  test-redis:
    image: redis:7.4-alpine
    container_name: stomvp-test-redis
    ports:
      - "6382:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
